name: Deploy Hostinger VPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA). Leave empty to use current ref."
        required: false
        type: string

concurrency:
  group: deploy-hostinger-vps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: |
            web/go.sum
            worker/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Test web
        run: GOTOOLCHAIN=local go test ./...
        working-directory: web

      - name: Test worker
        run: GOTOOLCHAIN=local go test ./...
        working-directory: worker

      - name: Test frontend
        run: |
          npm ci
          npm test -- --run
        working-directory: frontend

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}

      - name: Setup SSH key and known hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_ACTION_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '.env.production' \
            --exclude 'node_modules/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/dist/' \
            --exclude 'tmp/' \
            --exclude '.cache/' \
            ./ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

      - name: Deploy and run remote smoke checks
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_ACTION_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          BETTERSTACK_INGESTING_HOST: ${{ secrets.BETTERSTACK_INGESTING_HOST }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_AUTHORIZED_PARTIES: ${{ secrets.CLERK_AUTHORIZED_PARTIES }}
          CLERK_PROXY_URL: ${{ secrets.CLERK_PROXY_URL }}
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
        run: |
          set -euo pipefail
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' BETTERSTACK_SOURCE_TOKEN='${BETTERSTACK_SOURCE_TOKEN}' BETTERSTACK_INGESTING_HOST='${BETTERSTACK_INGESTING_HOST}' VITE_CLERK_PUBLISHABLE_KEY='${VITE_CLERK_PUBLISHABLE_KEY}' CLERK_SECRET_KEY='${CLERK_SECRET_KEY}' CLERK_AUTHORIZED_PARTIES='${CLERK_AUTHORIZED_PARTIES}' CLERK_PROXY_URL='${CLERK_PROXY_URL}' CLERK_JWKS_URL='${CLERK_JWKS_URL}' bash -se" <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          test -f .env.production
          dump_compose_diagnostics() {
            docker compose -f docker-compose.prod.yml --env-file .env.production ps || true
            docker compose -f docker-compose.prod.yml --env-file .env.production logs --no-color --tail=200 web worker frontend || true
          }
          trap 'dump_compose_diagnostics' ERR
          set -a
          # shellcheck disable=SC1091
          source .env.production
          set +a
          require_ci_value() {
            key="$1"
            value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "Missing required GitHub Actions secret: ${key}" >&2
              exit 1
            fi
          }
          require_ci_value "VITE_CLERK_PUBLISHABLE_KEY"
          if [ "${CLERK_ENABLED:-false}" = "true" ]; then
            require_ci_value "CLERK_SECRET_KEY"
            require_ci_value "CLERK_AUTHORIZED_PARTIES"
          fi
          ensure_env_var() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" .env.production; then
              sed -i.bak "s|^${key}=.*|${key}=${value}|" .env.production
            else
              printf '\n%s=%s\n' "${key}" "${value}" >> .env.production
            fi
          }
          ensure_env_var "BETTERSTACK_SOURCE_TOKEN" "${BETTERSTACK_SOURCE_TOKEN}"
          ensure_env_var "BETTERSTACK_INGESTING_HOST" "${BETTERSTACK_INGESTING_HOST}"
          ensure_env_var "VITE_CLERK_PUBLISHABLE_KEY" "${VITE_CLERK_PUBLISHABLE_KEY}"
          if [ "${CLERK_ENABLED:-false}" = "true" ]; then
            ensure_env_var "CLERK_SECRET_KEY" "${CLERK_SECRET_KEY}"
            ensure_env_var "CLERK_AUTHORIZED_PARTIES" "${CLERK_AUTHORIZED_PARTIES}"
            if [ -n "${CLERK_PROXY_URL:-}" ]; then
              ensure_env_var "CLERK_PROXY_URL" "${CLERK_PROXY_URL}"
            fi
            ensure_env_var "CLERK_JWKS_URL" "${CLERK_JWKS_URL:-}"
          fi
          rm -f .env.production.bak

          set -a
          # shellcheck disable=SC1091
          source .env.production
          set +a

          require_nonempty() {
            key="$1"
            value="${!key:-}"
            if [ -z "${value}" ]; then
              echo "Missing required .env.production value: ${key}" >&2
              exit 1
            fi
          }

          is_positive_int() {
            case "$1" in
              ''|*[!0-9]*|0) return 1 ;;
              *) return 0 ;;
            esac
          }

          is_remote_database_url() {
            case "${1:-}" in
              libsql://*|http://*|https://*|ws://*|wss://*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          require_nonempty APP_ENV
          require_nonempty WEB_PORT
          require_nonempty WORKER_POLL_INTERVAL_SECS
          require_nonempty WORKER_HEALTH_PORT
          require_nonempty WORKER_GAMEMASTER_PATH
          require_nonempty UPLOAD_STORAGE_MODE
          require_nonempty VITE_CLERK_PUBLISHABLE_KEY

          is_positive_int "${WEB_PORT}" || { echo "WEB_PORT must be a positive integer" >&2; exit 1; }
          is_positive_int "${WORKER_POLL_INTERVAL_SECS}" || { echo "WORKER_POLL_INTERVAL_SECS must be a positive integer" >&2; exit 1; }
          is_positive_int "${WORKER_HEALTH_PORT}" || { echo "WORKER_HEALTH_PORT must be a positive integer" >&2; exit 1; }

          if [ "${APP_ENV}" != "local" ] && [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL is required when APP_ENV is not local" >&2
            exit 1
          fi

          if is_remote_database_url "${DATABASE_URL:-}"; then
            require_nonempty DATABASE_AUTH_TOKEN
          fi

          case "${UPLOAD_STORAGE_MODE}" in
            local)
              require_nonempty UPLOAD_LOCAL_DIR
              ;;
            uploadthing)
              require_nonempty UPLOADTHING_TOKEN
              ;;
            *)
              echo "UPLOAD_STORAGE_MODE must be one of: local, uploadthing" >&2
              exit 1
              ;;
          esac

          if [ "${CLERK_ENABLED:-false}" = "true" ]; then
            require_nonempty CLERK_SECRET_KEY
            require_nonempty CLERK_AUTHORIZED_PARTIES
          fi

          docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
          ENV_FILE=.env.production \
          COMPOSE_CMD='docker compose -f docker-compose.prod.yml --env-file .env.production' \
          ./scripts/smoke/verify_stack.sh
          EOF

      - name: Verify public endpoints
        run: |
          set -euo pipefail
          curl -fsS https://vibepogo.victoroliveira.com.br/ >/dev/null
          curl -fsS https://vibepogo.victoroliveira.com.br/api/healthz >/dev/null
