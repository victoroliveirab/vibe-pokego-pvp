services:
  web:
    build:
      context: ./web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UPLOAD_STORAGE_MODE: ${UPLOAD_STORAGE_MODE:-local}
      UPLOAD_LOCAL_DIR: ${UPLOAD_LOCAL_DIR:-./testdata/uploads}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
      UPLOADTHING_PREPARE_UPLOAD_URL: ${UPLOADTHING_PREPARE_UPLOAD_URL:-https://api.uploadthing.com/v7/prepareUpload}
      UPLOADTHING_REQUEST_TIMEOUT_SECS: ${UPLOADTHING_REQUEST_TIMEOUT_SECS:-30}
      WORKER_GAMEMASTER_PATH: ${WORKER_GAMEMASTER_PATH:-./internal/pokemon.json}
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - ./var:/app/var
      - uploads_data:/app/testdata/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - appnet

  worker:
    build:
      context: ./worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      UPLOAD_STORAGE_MODE: ${UPLOAD_STORAGE_MODE:-local}
      UPLOAD_LOCAL_DIR: ${UPLOAD_LOCAL_DIR:-./testdata/uploads}
      WORKER_UPLOADTHING_DOWNLOAD_TIMEOUT_SECS: ${WORKER_UPLOADTHING_DOWNLOAD_TIMEOUT_SECS:-30}
      WORKER_UPLOADTHING_DOWNLOAD_RETRY_COUNT: ${WORKER_UPLOADTHING_DOWNLOAD_RETRY_COUNT:-2}
      WORKER_UPLOADTHING_DOWNLOAD_TEMP_DIR: ${WORKER_UPLOADTHING_DOWNLOAD_TEMP_DIR:-}
    ports:
      - "${WORKER_HEALTH_PORT:-8081}:${WORKER_HEALTH_PORT:-8081}"
    volumes:
      - ./var:/app/var
      - uploads_data:/app/testdata/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WORKER_HEALTH_PORT}/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    ports:
      - "${FRONTEND_PORT:-4173}:5173"
    command: ["npm", "run", "dev", "--", "--host", "--port", "5173"]
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      web:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - appnet

volumes:
  uploads_data:
  frontend_node_modules:

networks:
  appnet:
    driver: bridge
